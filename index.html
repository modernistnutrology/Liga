<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Liga Village Padel Club</title>

    <!-- Ícones padrão (browsers desktop) -->
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />

    <!-- iOS / iPhone: ícone na tela inicial (180x180 recomendado, mas qualquer tamanho funciona) -->
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.jpg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/logo.jpg" />
    <link rel="apple-touch-icon" sizes="120x120" href="/logo.jpg" />

    <!-- iOS standalone app (sem barra do Safari quando aberto da tela inicial) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Liga Village" />

    <!-- Android / PWA -->
    <meta name="theme-color" content="#062a32" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
